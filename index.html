<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>優妮公主英文歷險記</title>
<style>
    /* =========================================
       🎨 1. 全域與響應式 (RWD) 樣式設定
       ========================================= */
    body { margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; user-select: none; touch-action: manipulation; }
    
    #game-wrapper { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; background-color: #1a1a1a; }
    
    #game-container { width: 800px; height: 600px; background-color: #000; border: 8px solid #bdc3c7; border-radius: 4px; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.8); position: absolute; transform-origin: center center; overflow: hidden; flex-shrink: 0; }

    #portrait-warning { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: #fff; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; }
    @media screen and (orientation: portrait) and (max-width: 768px) { #portrait-warning { display: flex; } }

    .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; box-sizing: border-box; color: white; text-align: center; background-color: #2c3e50; z-index: 50; }
    .hidden { display: none !important; }

    .pixel-btn { background-color: #f1c40f; border: 4px solid #d35400; padding: 12px 24px; font-size: 1.5rem; font-family: inherit; font-weight: bold; cursor: pointer; color: #2c3e50; transition: transform 0.1s; box-shadow: 4px 4px 0px #000; border-radius: 4px; }
    .pixel-btn:hover:not(:disabled) { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
    .pixel-btn:disabled { background-color: #95a5a6; border-color: #7f8c8d; cursor: not-allowed; box-shadow: none; transform: translate(2px, 2px); }

    /* 角色選擇 */
    #char-select-screen { background-color: #2980b9; border: 8px solid #34495e; }
    #char-title { font-size: 2.5rem; color: #f1c40f; margin-bottom: 20px; text-shadow: 3px 3px #000; }
    #name-input { background-color: #ecf0f1; border: 4px solid #34495e; padding: 12px; font-size: 1.5rem; font-family: inherit; margin-bottom: 40px; width: 300px; text-align: center; font-weight: bold; color: #2c3e50; outline: none; }
    .char-options { display: flex; gap: 40px; margin-bottom: 40px; }
    .char-card { border: 6px solid transparent; padding: 20px; cursor: pointer; transition: all 0.2s; background-color: rgba(0,0,0,0.4); border-radius: 8px; }
    .char-card.selected { border-color: #f1c40f; background-color: rgba(241, 196, 15, 0.3); transform: scale(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .preview-canvas { width: 96px; height: 128px; image-rendering: pixelated; display: block; }

    /* 故事前言 */
    #story-screen { background-color: #1a1a1a; border: 8px solid #8e44ad; justify-content: center; padding: 60px 40px; }
    #story-box { background-color: rgba(0,0,0,0.8); border: 4px solid #ecf0f1; padding: 40px; border-radius: 8px; width: 85%; min-height: 220px; display: flex; align-items: flex-start; justify-content: left; box-shadow: inset 0 0 20px rgba(255,255,255,0.1); z-index: 10; }
    #story-text { font-size: 1.6rem; line-height: 1.8; text-align: left; text-shadow: 2px 2px #000; color: #ecf0f1; width: 100%; }
    .highlight { color: #f1c40f; font-weight: bold; }
    .action-text { color: #e74c3c; font-style: italic; font-size: 1.2rem; }
    .story-controls { position: relative; display: flex; width: 85%; justify-content: center; align-items: center; margin-top: 30px; z-index: 10; }
    #skip-story { position: absolute; right: 0; bottom: 10px; font-size: 1.2rem; color: #95a5a6; cursor: pointer; text-decoration: underline; }
    #story-anim-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; overflow: hidden; }
    .falling-item { position: absolute; font-size: 4rem; top: 20%; opacity: 0; transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); filter: drop-shadow(2px 4px 6px black); }

    /* 遊戲主畫面佈局 */
    #main-game-screen { padding: 0; justify-content: space-between; background-color: transparent; }
    #header { background-color: #34495e; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 6px solid #2c3e50; height: 50px; z-index: 20; box-shadow: 0 4px 10px rgba(0,0,0,0.5); width: 100%; box-sizing: border-box; }
    #progress-container { position: relative; width: 350px; display: flex; justify-content: space-between; align-items: center; }
    #progress-line { position: absolute; top: 50%; left: 0; right: 0; height: 6px; background-color: #f1c40f; z-index: 1; transform: translateY(-50%); border: 2px solid #000; }
    .node { width: 32px; height: 32px; background-color: #7f8c8d; border: 4px solid #f1c40f; border-radius: 50%; z-index: 2; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: bold; color: white; text-shadow: 1px 1px #000; box-shadow: 2px 2px 0 #000; transition: background-color 0.3s; }
    .node.completed { background-color: #2ecc71; }
    #player-progress-head { position: absolute; width: 24px; height: 24px; border: 4px solid #fff; background-color: #e74c3c; z-index: 5; transform: translate(-50%, -50%); transition: left 0.5s ease; font-size: 14px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border-radius: 50%; box-shadow: 2px 2px 0 #000; left: 0; }
    
    .status-area { display: flex; gap: 20px; align-items: center; }
    #stamina-info { font-size: 1.2rem; font-weight: bold; color: #2ecc71; text-shadow: 2px 2px #000; letter-spacing: 2px; }
    #coin-info { font-size: 1.5rem; font-weight: bold; color: #f1c40f; text-shadow: 3px 3px #000; cursor: pointer; transition: transform 0.1s; pointer-events: auto; }
    #coin-info:hover { transform: scale(1.1); }

    #game-area { flex: 1; position: relative; overflow: hidden; width: 100%; }
    #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; image-rendering: pixelated; z-index: 1; }

    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 15px; z-index: 10; }
    #question-board { background-color: rgba(236, 240, 241, 0.95); border: 8px solid #2980b9; border-radius: 8px; padding: 15px 30px; text-align: center; pointer-events: auto; box-shadow: 0 10px 0px rgba(0,0,0,0.3); transition: transform 0.2s; max-width: 85%; max-height: 95%; overflow-y: auto; box-sizing: border-box; }
    
    .options-container { display: flex; gap: 10px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
    .option-btn { background-color: #f1c40f; border: 6px solid #d35400; padding: 8px 16px; font-size: 1.5rem; font-family: inherit; font-weight: bold; cursor: pointer; color: #2c3e50; transition: transform 0.1s; pointer-events: auto; border-radius: 8px; box-shadow: 0 4px 0 #a04000; }
    .option-btn:hover:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 #a04000; background-color: #f39c12; }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.8; }
    
    #message-area { margin-top: 20px; font-size: 1.5rem; color: white; background-color: #e74c3c; padding: 10px 20px; border: 6px solid #c0392b; display: none; font-weight: bold; text-shadow: 2px 2px #000; border-radius: 8px; animation: shake 0.4s; }
    @keyframes shake { 0%{transform: translateX(0);} 25%{transform: translateX(-10px);} 50%{transform: translateX(10px);} 75%{transform: translateX(-10px);} 100%{transform: translateX(0);} }

    /* Footer 調整為兩側對齊 */
    #footer { background-color: #34495e; padding: 15px 20px; border-top: 6px solid #2c3e50; display: flex; justify-content: space-between; align-items: center; z-index: 20; box-shadow: 0 -4px 10px rgba(0,0,0,0.5); width: 100%; box-sizing: border-box; }
    
    .footer-left { display: flex; gap: 15px; align-items: center; }
    #backpack-btn { background-color: #8e44ad; color: white; border: 4px solid #000; padding: 10px 20px; font-size: 1.2rem; font-family: inherit; font-weight: bold; cursor: pointer; box-shadow: 4px 4px 0px #000; border-radius: 4px; pointer-events: auto; transition: transform 0.1s; }
    #backpack-btn:hover { transform: translateY(2px); box-shadow: 2px 2px 0px #000; }
    
    #wand-btn { background-color: #f1c40f; color: #2c3e50; border: 4px solid #d35400; padding: 10px 20px; font-size: 1.2rem; font-family: inherit; font-weight: bold; cursor: pointer; box-shadow: 4px 4px 0px #000; border-radius: 4px; pointer-events: auto; transition: transform 0.1s; }
    #wand-btn:hover { transform: translateY(2px); box-shadow: 2px 2px 0px #000; background-color: #f39c12; }
    
    #restart-btn { background-color: #e74c3c; color: white; border: 4px solid #c0392b; padding: 10px 20px; font-size: 1.2rem; font-family: inherit; font-weight: bold; cursor: pointer; box-shadow: 4px 4px 0px #000; border-radius: 4px; pointer-events: auto; transition: transform 0.1s; }
    #restart-btn:hover { transform: translateY(2px); box-shadow: 2px 2px 0px #000; background-color: #c0392b; }

    /* 🛍️ 各種彈出視窗 */
    .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; display: flex; justify-content: center; align-items: center; pointer-events: auto; }
    .modal-box { background: #ecf0f1; border: 8px solid #34495e; border-radius: 8px; padding: 30px; width: 85%; max-width: 550px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; max-height: 90vh; overflow-y: auto; }
    .close-btn { position: absolute; top: 10px; right: 15px; font-size: 2rem; color: #c0392b; cursor: pointer; font-weight: bold; }
    .close-btn:hover { color: #e74c3c; }
    .item-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
    .shop-item { background: #fff; border: 4px solid #bdc3c7; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
    .shop-item:hover { border-color: #f1c40f; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .item-icon { font-size: 3rem; margin-bottom: 5px; }
    .item-price { font-size: 1.2rem; font-weight: bold; color: #d35400; margin-top: 5px; }
    .item-desc { font-size: 0.9rem; color: #7f8c8d; font-weight: bold; }
    .bp-item { font-size: 3rem; background: #bdc3c7; border: 4px solid #7f8c8d; border-radius: 8px; width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; position: relative;}
    .bp-item:hover { border-color: #f1c40f; transform: scale(1.1); }
    
    @keyframes phone-ring { 0%{transform: rotate(0deg);} 25%{transform: rotate(-5deg);} 50%{transform: rotate(5deg);} 75%{transform: rotate(-5deg);} 100%{transform: rotate(0deg);} }
    .ringing { animation: phone-ring 0.5s 2; border-color: #e74c3c; } 
    
    .phone-keypad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
    .phone-key { background: #34495e; color: #fff; font-size: 1.8rem; font-weight: bold; padding: 10px; border-radius: 8px; cursor: pointer; border: 4px solid #2c3e50; font-family: 'Courier New', Courier, monospace;}
    .phone-key:hover { background: #2980b9; border-color: #f1c40f; }
</style>
</head>
<body>

<div id="portrait-warning">
    <div style="font-size: 4rem; margin-bottom: 20px;">🔄</div>
    <div style="font-size: 1.8rem; font-weight: bold; line-height: 1.5;">為了獲得最佳遊戲體驗<br>請將手機「橫向」拿取喔！</div>
</div>

<div id="game-wrapper">
    <div id="game-container">
        
        <div id="char-select-screen" class="screen">
            <div id="char-title">選擇你的冒險角色</div>
            <input type="text" id="name-input" placeholder="輸入玩家名稱" maxlength="8">
            <div class="char-options">
                <div class="char-card selected" data-char="0"><canvas id="prev-cvs-0" class="preview-canvas" width="48" height="64"></canvas></div>
                <div class="char-card" data-char="1"><canvas id="prev-cvs-1" class="preview-canvas" width="48" height="64"></canvas></div>
                <div class="char-card" data-char="2"><canvas id="prev-cvs-2" class="preview-canvas" width="48" height="64"></canvas></div>
            </div>
            <button class="pixel-btn" id="confirm-char-btn">確認出發</button>
        </div>

        <div id="story-screen" class="screen hidden">
            <div id="story-box"><div id="story-text"></div></div>
            <div class="story-controls">
                <button class="pixel-btn" id="story-next-btn">下一頁 ►</button>
                <div id="skip-story">按 SKIP 略過故事</div>
            </div>
            <div id="story-anim-layer">
                <div id="item-food" class="falling-item" style="left: 35%;">🍙</div>
                <div id="item-phone" class="falling-item" style="right: 35%;">📱</div>
            </div>
        </div>

        <div id="main-game-screen" class="screen hidden">
            <div id="header">
                <div id="progress-container">
                    <div id="progress-line"></div>
                    <div class="node" id="node-0">1</div><div class="node" id="node-1">2</div><div class="node" id="node-2">3</div><div class="node" id="node-3">4</div><div class="node" id="node-4">🏁</div>
                    <div id="player-progress-head">P</div>
                </div>
                
                <div class="status-area">
                    <div id="stamina-info">⚡ <span id="stamina-bars">🟩🟩🟩🟩🟩</span></div>
                    <div id="coin-info" onclick="openShop()">💰 <span id="coin-count">0</span></div>
                </div>
            </div>
            
            <div id="game-area">
                <canvas id="gameCanvas" width="800" height="460"></canvas>
                <div id="ui-layer">
                    <div id="question-board">讀取中...</div>
                    <div id="message-area">哎呀！再試一次！</div>
                </div>
            </div>
            
            <div id="footer">
                <div class="footer-left">
                    <button id="backpack-btn" onclick="openBackpack()">🎒 我的背包 (0)</button>
                    <button id="wand-btn" class="hidden" onclick="useWandDirectly()">🪄 使用魔杖</button>
                </div>
                <button id="restart-btn" onclick="location.reload()">🔄 重新玩</button>
            </div>
        </div>

        <div id="stamina-modal" class="modal-overlay hidden">
            <div class="modal-box">
                <div class="close-btn" onclick="document.getElementById('stamina-modal').classList.add('hidden')">✖</div>
                <h2 style="color:#e74c3c; margin-top:0;">⚠️ 體力警告</h2>
                <p style="font-weight:bold; font-size:1.2rem; color:#34495e;">體力只剩最後 1 格了！<br>怪物很快就會追上來！</p>
                <div style="display:flex; justify-content:center; gap:15px; margin-top:20px;">
                    <button class="pixel-btn" onclick="document.getElementById('stamina-modal').classList.add('hidden'); openBackpack();">🎒 打開背包</button>
                    <button class="pixel-btn" onclick="document.getElementById('stamina-modal').classList.add('hidden'); openShop();">🏪 前往商店</button>
                </div>
            </div>
        </div>

        <div id="shop-modal" class="modal-overlay hidden">
            <div class="modal-box">
                <div class="close-btn" onclick="closeShop()">✖</div>
                <h2 style="color:#2980b9; margin-top:0;">🏪 森林商店</h2>
                <p style="color:#7f8c8d; font-weight:bold;">你有 <span id="shop-coin-display" style="color:#f1c40f;">0</span> 金幣可以購物</p>
                <div class="item-grid">
                    <div class="shop-item" onclick="buyItem('格子鬆餅🧇', 20)">
                        <div class="item-icon">🧇</div><div style="font-weight:bold; color:#2c3e50;">格子鬆餅</div>
                        <div class="item-desc">回復 2 格體力</div><div class="item-price">💰 20</div>
                    </div>
                    <div class="shop-item" onclick="buyItem('巧克力🍫', 10)">
                        <div class="item-icon">🍫</div><div style="font-weight:bold; color:#2c3e50;">巧克力</div>
                        <div class="item-desc">回復 1 格體力</div><div class="item-price">💰 10</div>
                    </div>
                    <div class="shop-item" onclick="buyItem('魔杖🪄', 50)">
                        <div class="item-icon">🪄</div><div style="font-weight:bold; color:#2c3e50;">魔法魔杖</div>
                        <div class="item-desc">可主動擊退怪物</div><div class="item-price">💰 50</div>
                    </div>
                    <div class="shop-item" onclick="buyItem('鮮花籃子💐', 30)">
                        <div class="item-icon">💐</div><div style="font-weight:bold; color:#2c3e50;">鮮花籃子</div>
                        <div class="item-desc">漂亮的裝飾品</div><div class="item-price">💰 30</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="backpack-modal" class="modal-overlay hidden">
            <div class="modal-box">
                <div class="close-btn" onclick="closeBackpack()">✖</div>
                <h2 style="color:#8e44ad; margin-top:0;">🎒 我的背包</h2>
                <p style="color:#7f8c8d; font-weight:bold; margin-top:-10px;">點擊物品可以使用喔！</p>
                <div id="backpack-grid" style="display:flex; flex-wrap:wrap; gap:15px; justify-content:center; margin-top:20px; min-height: 100px;"></div>
            </div>
        </div>

        <div id="phone-modal" class="modal-overlay hidden">
            <div class="modal-box ringing" id="phone-box">
                <h2 style="color:#e74c3c; margin-top:0;">📞 未知來電</h2>
                <p style="font-weight:bold; color:#34495e; font-size:1.2rem;">請輸入 5 位英文字母密碼解鎖手機！</p>
                <button class="pixel-btn" onclick="playPhonePassword()">🔊 聽取密碼</button>
                <div id="phone-display" style="font-size: 2.5rem; letter-spacing: 15px; margin: 20px 0; font-weight: bold; background: #ecf0f1; padding: 15px; border-radius: 8px; border: 4px solid #bdc3c7; color:#2c3e50;">_ _ _ _ _</div>
                <div id="phone-keypad" class="phone-keypad"></div>
            </div>
        </div>

    </div>
</div>

<script>
/**
 * 公主歷險記 - 全螢幕與戰略生存版 v5.0 (Dustine)
 */

// =========================================
// 📱 RWD 畫面縮放系統
// =========================================
function resizeGame() {
    const container = document.getElementById('game-container');
    const scaleX = window.innerWidth / 800;
    const scaleY = window.innerHeight / 600;
    const scale = Math.min(scaleX, scaleY) * 0.98;
    container.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', resizeGame);
window.addEventListener('orientationchange', () => setTimeout(resizeGame, 100));
resizeGame(); 

// =========================================
// ⚙️ 1. 全域資料狀態
// =========================================
const GAME_STATE = { SELECT: 0, STORY: 1, LEVEL1: 2, LEVEL2: 3, LEVEL3: 4, LEVEL4: 5, LEVEL5: 6, ENDING: 7 };

const state = {
    gameState: GAME_STATE.SELECT, coins: 0,
    playerName: '', selectedCharIndex: 0, storyPage: 0, 
    backpack: [], pet: null, petSound: null, // 💡 儲存寵物類型與叫聲
    
    stamina: 5, maxStamina: 5, isStarving: false, staminaTimer: null, staminaWarned: false,
    
    currentQuestions: [], currentQuestionIndex: 0, mistakesCurrentQuestion: 0, mistakeReviewPool: [],
    scrollX: 0, targetScrollX: 0, playerFallAngle: 0, isFalling: false, isWalking: false, walkOffset: 0,
    
    monsterDefeated: false, wolfDefeated: false,
    monsterBaseX: 100, wolfBaseX: 20, gameOver: false,
    
    grandpaHealed: false, endingBedX: 0, confetti: []
};

const DOM = {
    sel: document.getElementById('char-select-screen'), story: document.getElementById('story-screen'), game: document.getElementById('main-game-screen'),
    cards: document.querySelectorAll('.char-card'), nextBtn: document.getElementById('story-next-btn'), bpBtn: document.getElementById('backpack-btn'),
    msg: document.getElementById('message-area'), board: document.getElementById('question-board')
};

// =========================================
// 🎵 2. 音效與語音引擎 (含寵物叫聲)
// =========================================
const AudioEngine = {
    ctx: null,
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
    play(f, t, d, v=0.1) { this.init(); let o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.type=t; o.frequency.setValueAtTime(f, this.ctx.currentTime); g.gain.setValueAtTime(v, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+d); o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime+d); },
    phone() { let t=false, c=0, i=setInterval(()=>{ this.play(t?600:750,'square',0.1,0.15); t=!t; c++; if(c>15) clearInterval(i); }, 80); },
    cough() { setTimeout(()=>this.play(150,'sawtooth',0.2,0.2),0); setTimeout(()=>this.play(130,'sawtooth',0.25,0.2),300); },
    swish() { this.init(); let o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.type='triangle'; o.frequency.setValueAtTime(800,this.ctx.currentTime); o.frequency.exponentialRampToValueAtTime(100,this.ctx.currentTime+0.3); g.gain.setValueAtTime(0.2,this.ctx.currentTime); g.gain.linearRampToValueAtTime(0.001,this.ctx.currentTime+0.3); o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime+0.3); },

function updateUI() {
    document.getElementById('coin-count').innerText = state.coins;
    DOM.bpBtn.innerText = `🎒 我的背包 (${state.backpack.length})`;
    let bars = "🟩".repeat(state.stamina) + "⬜".repeat(5 - state.stamina);
    document.getElementById('stamina-bars').innerText = bars;
    
    let wandBtn = document.getElementById('wand-btn');
    if (state.backpack.some(i => i.includes('魔杖')) && (state.gameState === GAME_STATE.LEVEL2 || state.gameState === GAME_STATE.LEVEL5)) {
        wandBtn.classList.remove('hidden');
    } else {
        wandBtn.classList.add('hidden');
    }
}

function startStaminaDrain() {
    if(state.staminaTimer) clearInterval(state.staminaTimer);
    state.staminaTimer = setInterval(() => {
        if(state.gameState >= GAME_STATE.LEVEL1 && state.gameState < GAME_STATE.ENDING && !state.isStarving && !state.gameOver) {
            state.stamina--;
            
            if(state.stamina === 1 && !state.staminaWarned) {
                state.staminaWarned = true;
                AudioEngine.wrong();
                document.getElementById('stamina-modal').classList.remove('hidden');
            }
            
            if(state.stamina <= 0) { state.stamina = 0; state.isStarving = true; }
            updateUI();
        }
    }, 15000);
}

function openShop() { if(state.gameState < GAME_STATE.LEVEL1 || state.gameOver) return; AudioEngine.play(400, 'sine', 0.1); document.getElementById('shop-coin-display').innerText = state.coins; document.getElementById('shop-modal').classList.remove('hidden'); }
function closeShop() { document.getElementById('shop-modal').classList.add('hidden'); }
function buyItem(itemName, cost) {
    if (state.coins >= cost) { state.coins -= cost; state.backpack.push(itemName); updateUI(); document.getElementById('shop-coin-display').innerText = state.coins; AudioEngine.correct(); alert(`成功購買 ${itemName}！`); } 
    else { AudioEngine.wrong(); alert("金幣不夠喔！快去闖關賺錢吧！"); }
}

function openBackpack() {
    if(state.gameState < GAME_STATE.LEVEL1 || state.gameOver) return; AudioEngine.play(300, 'sine', 0.1);
    const grid = document.getElementById('backpack-grid');
    if (state.backpack.length === 0) { grid.innerHTML = `<div style="color:#7f8c8d; width:100%;">背包空空的...</div>`; } 
    else { grid.innerHTML = state.backpack.map((item, idx) => { let emoji = item.slice(-2); if(emoji.match(/[A-Za-z]/)) emoji = item.slice(-4); return `<div class="bp-item" title="點擊使用 ${item}" onclick="useItem(${idx})">${emoji}</div>`; }).join(''); }
    document.getElementById('backpack-modal').classList.remove('hidden');
}
function closeBackpack() { document.getElementById('backpack-modal').classList.add('hidden'); }

window.useItem = function(index) {
    let item = state.backpack[index];
    if (item.includes('食物')) { alert("不行！這是要帶給阿公的食物，不能偷吃喔！"); } 
    else if (item.includes('巧克力') || item.includes('鬆餅')) {
        let heal = item.includes('巧克力') ? 1 : 2; state.stamina = Math.min(5, state.stamina + heal); state.backpack.splice(index, 1); state.isStarving = false; if (state.stamina > 1) state.staminaWarned = false; state.monsterBaseX = 100; state.wolfBaseX = 20; AudioEngine.correct(); updateUI(); openBackpack(); 
    } 
    else if (item.includes('魔杖')) { alert("請直接點擊畫面左下方的『🪄 使用魔杖』快捷按鈕喔！"); } 
    else { alert("這個物品不能使用喔！"); }
}

window.useWandDirectly = function() {
    let wandIdx = state.backpack.findIndex(i => i.includes('魔杖'));
    if(wandIdx > -1) {
        if ((state.gameState === GAME_STATE.LEVEL2 && !state.monsterDefeated) || (state.gameState === GAME_STATE.LEVEL5 && !state.wolfDefeated)) {
            if (state.gameState === GAME_STATE.LEVEL2) state.monsterBaseX = Math.max(-100, state.monsterBaseX - 200);
            if (state.gameState === GAME_STATE.LEVEL5) state.wolfBaseX = Math.max(-100, state.wolfBaseX - 200);
            state.backpack.splice(wandIdx, 1); AudioEngine.magic(); updateUI(); alert("✨ 你揮舞了魔杖！成功將怪物往後擊退了！");
        } else { alert("現在沒有怪物追趕，還不需要使用魔杖喔！"); }
    }
}

function drawMonster(sprite, scale, isDefeated, baseX) {
    if(isDefeated) return;
    const h = sprite.length * scale, x = baseX, y = 380 - h - Math.abs(Math.sin(Date.now() / 150)) * 20; 
    ctx.save(); ctx.translate(x, y);
    for(let r=0; r<sprite.length; r++) { for(let c=0; c<sprite[r].length; c++) { let char = sprite[r][c]; if(C[char]) { ctx.fillStyle = C[char]; ctx.fillRect(c*scale, r*scale, scale, scale); } } }
    ctx.restore();

function drawPlayerGame() {
    const s = sprites[state.selectedCharIndex], scale = 6, w = s[0].length*scale, h = s.length*scale;
    const x = 350, y = 380 - h + state.walkOffset; 
    ctx.save(); 
    
    // 💡 繪製跟隨的寵物夥伴
    if(state.pet && !state.gameOver) { 
        const pSprite = petSprites[state.pet], pScale = 4;
        const pW = pSprite[0].length * pScale, pH = pSprite.length * pScale;
        const pX = x - pW - 20, pY = 380 - pH + (state.walkOffset * 0.8);
        ctx.save(); ctx.translate(pX, pY);
        for(let r=0; r<pSprite.length; r++) { for(let c=0; c<pSprite[r].length; c++) { let char = pSprite[r][c]; if(C[char]) { ctx.fillStyle = C[char]; ctx.fillRect(c*pScale, r*pScale, pScale, pScale); } } }
        ctx.restore();
    }
    
    ctx.translate(x+w/2, y+h);
    if(state.isStarving || state.gameOver) { ctx.rotate((90 * Math.PI)/180); if(!state.gameOver) { ctx.font = "20px Arial"; ctx.fillStyle = "#fff"; ctx.fillText("我很餓...", -30, -50); }
    } else if(state.isFalling) { ctx.rotate((state.playerFallAngle*Math.PI)/180); }
    for(let r=0; r<s.length; r++) { for(let c=0; c<s[r].length; c++) { if(C[s[r][c]]) { ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(-w/2+c*scale+4, -h+r*scale+4, scale, scale); ctx.fillStyle=C[s[r][c]]; ctx.fillRect(-w/2+c*scale, -h+r*scale, scale, scale); } } }
    ctx.restore();
}

    ctx.save(); ctx.translate(x, y); if(angle) ctx.rotate((angle * Math.PI)/180);
    for(let r=0; r<m.length; r++) { for(let c=0; c<m[r].length; c++) { let char = m[r][c]; if(C[char]) { ctx.fillStyle = C[char]; ctx.fillRect(-w/2 + c*scale, -h + r*scale, scale, scale); } } }
    ctx.restore();

    if(state.gameOver) return; if(state.isStarving) { alert("太餓了，請打開背包吃東西補充體力！"); return; } if(l4_data.matched.includes(word)) return; 
    if(type === 'word') { AudioEngine.speak(word, 'en-US'); l4_data.selected = { idx, word }; l4_data.left.forEach((_, i) => { let el = document.getElementById(`l4-word-${i}`); if(!l4_data.matched.includes(l4_data.left[i].word)) el.style.borderColor = '#34495e'; }); document.getElementById(`l4-word-${idx}`).style.borderColor = '#e74c3c'; } 
    else if(type === 'emo' && l4_data.selected) { if(l4_data.selected.word === word) { l4_data.matched.push(word); AudioEngine.correct(); document.getElementById(`l4-emo-${idx}`).style.boxShadow = "0 0 10px 3px #f1c40f"; document.getElementById(`l4-emo-${idx}`).style.borderColor = "#f1c40f"; const wordEl = document.getElementById(`l4-word-${l4_data.selected.idx}`); wordEl.style.borderColor = "#2ecc71"; wordEl.style.backgroundColor = "#2ecc71"; wordEl.style.color = "#ffffff"; l4_data.selected = null; drawL4Lines(); checkL4Win(); } else { AudioEngine.wrong(); document.getElementById(`l4-word-${l4_data.selected.idx}`).style.borderColor = '#34495e'; l4_data.selected = null; } }
}
function drawL4Lines() {
    const svg = document.getElementById('l4-svg'); if(!svg) return; svg.innerHTML = '';
    l4_data.matched.forEach(word => { const leftIdx = l4_data.left.findIndex(i => i.word === word), rightIdx = l4_data.right.findIndex(i => i.word === word); const el1 = document.getElementById(`l4-word-${leftIdx}`), el2 = document.getElementById(`l4-emo-${rightIdx}`); const line = document.createElementNS("http://www.w3.org/2000/svg", "line"); line.setAttribute("x1", el1.offsetLeft + el1.offsetWidth); line.setAttribute("y1", el1.offsetTop + el1.offsetHeight / 2); line.setAttribute("x2", el2.offsetLeft); line.setAttribute("y2", el2.offsetTop + el2.offsetHeight / 2); line.setAttribute("stroke", "#c0392b"); line.setAttribute("stroke-width", "4"); line.setAttribute("stroke-linecap", "round"); svg.appendChild(line); });
}
function checkL4Win() { if(l4_data.matched.length === l4_data.left.length) { state.coins += 30; updateUI(); setTimeout(initPhoneEvent, 1500); } }

// L4 電話密碼
let phoneData = { pass: [], input: [], keys: [] };
function initPhoneEvent() {
    AudioEngine.phone(); const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"; phoneData.pass = []; for(let i=0; i<5; i++) phoneData.pass.push(chars[Math.floor(Math.random()*chars.length)]); phoneData.input = []; let options = [...phoneData.pass]; while(options.length < 10) { let c = chars[Math.floor(Math.random()*chars.length)]; if(!options.includes(c)) options.push(c); } phoneData.keys = options.sort(() => Math.random() - 0.5);
    document.getElementById('phone-display').innerText = "_ _ _ _ _"; document.getElementById('phone-keypad').innerHTML = phoneData.keys.map(k => `<button class="phone-key" onclick="handlePhoneKey('${k}')">${k}</button>`).join(''); document.getElementById('phone-modal').classList.remove('hidden');
}
window.playPhonePassword = function() { AudioEngine.speak(phoneData.pass.join(", "), 'en-US'); }
window.handlePhoneKey = function(k) {
    let nextExpected = phoneData.pass[phoneData.input.length];
    if(k === nextExpected) { AudioEngine.correct(); phoneData.input.push(k); document.getElementById('phone-display').innerText = phoneData.input.join(' ') + ' _'.repeat(5 - phoneData.input.length); if(phoneData.input.length === 5) { setTimeout(() => { document.getElementById('phone-modal').classList.add('hidden'); showMomMessage(); }, 500); } } 
    else { AudioEngine.wrong(); phoneData.input = []; document.getElementById('phone-display').innerText = "_ _ _ _ _"; let box = document.getElementById('phone-display'); box.style.animation = "shake 0.4s"; setTimeout(()=> box.style.animation = "", 400); }
}
function showMomMessage() { DOM.board.innerHTML = `<div style="padding:20px;"><h2 style="color:#e74c3c;">📞 媽媽來電</h2><p style="font-size:1.2rem; font-weight:bold;">「你到哪了？要趕快去找阿公，不要亂跑喔！」</p><button class="pixel-btn" onclick="startLevel5()" style="margin-top:15px;">我知道了！</button></div>`; document.getElementById('node-3').classList.add('completed'); let h = document.getElementById('player-progress-head'), n4 = document.getElementById('node-4'); h.style.left = n4.offsetLeft + (n4.offsetWidth/2) + 'px'; state.targetScrollX += 400; }

// L5 Boss與結局
window.startLevel5 = function() {
    state.gameState = GAME_STATE.LEVEL5; state.currentQuestionIndex = 0; state.wolfDefeated = false; updateUI(); let l5Qs = []; let mistakes = [...state.mistakeReviewPool].sort(()=>0.5-Math.random()).slice(0, 3); mistakes.forEach(m => l5Qs.push({ ...m, isReview: true })); const nouns = [ {e:"cat", emo:"🐱"}, {e:"dog", emo:"🐶"}, {e:"bird", emo:"🐦"} ];
    while(l5Qs.length < 6) { let n1 = nouns[Math.floor(Math.random()*nouns.length)], n2 = nouns[Math.floor(Math.random()*nouns.length)]; let isYes = (Math.random() > 0.5), qText, aText, opts; if(isYes) { qText = `Is it a ${n1.e}?`; aText = `Yes, it is a ${n1.e}.`; opts = [aText, `No, it's not a ${n1.e}.`, `Yes, it is a ${n2.e}.`]; } else { while(n1.e === n2.e) n2 = nouns[Math.floor(Math.random()*nouns.length)]; qText = `Is it a ${n2.e}?`; aText = `No, it's not a ${n2.e}.`; opts = [aText, `Yes, it is a ${n1.e}.`, `No, it is a ${n1.e}.`]; } opts = [...new Set(opts)]; while(opts.length < 3) { let rnd = nouns[Math.floor(Math.random()*nouns.length)].e; opts.push(`Yes, it is a ${rnd}.`); opts = [...new Set(opts)]; } l5Qs.push({ target: qText, answer: aText, options: opts.sort(()=>0.5-Math.random()), emo: n1.emo, isReview: false }); } state.currentQuestions = l5Qs; DOM.board.innerHTML = `<div style="font-size: 2rem; font-weight:bold; color:#e74c3c; margin-bottom: 20px;">🐺 最終 Boss 戰！</div>`; AudioEngine.howl(); state.targetScrollX += 800; setTimeout(renderLevel5, 3000);
}
function renderLevel5() {
    if(state.currentQuestionIndex >= state.currentQuestions.length) { state.wolfDefeated = true; state.gameState = GAME_STATE.ENDING; state.endingBedX = state.scrollX + 600; state.targetScrollX += 600; DOM.board.style.position = 'absolute'; DOM.board.style.top = '10px'; DOM.board.style.left = '50%'; DOM.board.style.transform = 'translateX(-50%)'; DOM.board.style.width = '80%'; DOM.board.style.background = 'rgba(236, 240, 241, 0.85)'; DOM.board.innerHTML = `<div style="padding:10px;"><h2>🏰 抵達皇宮！</h2><p>把食物給阿公吃吧！</p></div>`; document.getElementById('node-4').classList.add('completed'); document.getElementById('node-4').innerText='✔️'; let h = document.getElementById('player-progress-head'), n4 = document.getElementById('node-4'); h.style.left = n4.offsetLeft + (n4.offsetWidth/2) + 'px'; setTimeout(playEndingAnimation, 2500); return; }
    const q = state.currentQuestions[state.currentQuestionIndex]; let html = `<div style="font-size: 1.4rem; font-weight:bold; color:#e74c3c; margin-bottom: 10px;">🐺 最終 Boss 戰</div>`; if(q.emo && !q.isReview) html += `<div style="font-size:4rem;">${q.emo}</div>`; html += `<div style="font-size:2rem; color:#2c3e50; font-weight: bold; margin: 10px 0;">${q.isReview ? "⚠️ 複習錯題：<br>" : ""}${q.target}</div><div class="options-container" id="options"></div>`; DOM.board.innerHTML = html; DOM.opts = document.getElementById('options'); state.mistakesCurrentQuestion = 0; q.options.forEach(opt => { let btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = opt; btn.style.fontSize = '1.2rem'; btn.style.padding = '8px 12px'; btn.onclick = (e) => handleAns(opt, q.answer, e.target, renderLevel5); DOM.opts.appendChild(btn); });
}
function playEndingAnimation() {
    const foodIdx = state.backpack.indexOf('食物🍙'); if(foodIdx > -1) state.backpack.splice(foodIdx, 1); updateUI(); DOM.board.innerHTML = `<div style="padding:10px;"><h2>🍙 餵阿公吃食物...</h2></div>`; AudioEngine.swish();
    setTimeout(() => { state.grandpaHealed = true; AudioEngine.victory(); generateConfetti(); clearInterval(state.staminaTimer); document.getElementById('wand-btn').classList.add('hidden'); DOM.board.innerHTML = `<div style="padding:10px;"><h1 style="color:#e74c3c; font-size:2rem; margin:0;">🎉 任務大成功！🎉</h1><p style="font-size:1.2rem; font-weight:bold;">阿公病好了！謝謝你，${state.playerName}！</p><p style="margin-top: 5px;">總共收集金幣：💰 ${state.coins}</p></div>`; }, 1500);
}
</script>
